services:
  - type: web
    name: constellore-beta
    runtime: node
    plan: starter
    region: frankfurt
    numInstances: 1
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeployTrigger: "off"
    envVars:
      - key: NODE_ENV
        value: production
      - key: CONSTELLORE_DATA_PATH
        value: /var/data/constellore.json
      - key: CONSTELLORE_BACKUP_DIR
        value: /var/data/backups
      - key: CONSTELLORE_BACKUP_KEEP
        value: "7"
      - key: CONSTELLORE_COMMERCE_FULFILLMENT_READY
        value: "false"
      - key: CONSTELLORE_ENABLE_TEST_STORE
        value: "false"
      - key: REWARDED_ADS_ENABLED
        value: "false"
      - key: INTEREST_ALLOWED_ORIGINS
        value: https://yoxyfel.github.io
    # Free-to-play beta storage only. Do not use this JSON store for paid ownership.
    # OPENAI_API_KEY, NEBULA_CHECKOUT_URL, and CONSTELLORE_ADMIN_TOKEN are intentionally absent.
    disk:
      name: constellore-beta-data
      mountPath: /var/data
      sizeGB: 1
