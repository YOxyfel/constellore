name: Constellore checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci --ignore-scripts
      - run: npm run check

  browser-e2e:
    name: Browser journeys
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
      - run: npm run build:pages
      - run: npm run check:pages
      - run: npm run test:e2e:pages

  itch-package:
    name: Verify deterministic itch package
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build:itch
      - run: npm run check:itch
      - name: Upload verified HTML5 package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: constellore-itch-html5-${{ github.sha }}
          path: |
            dist-itch/*.zip
            dist-itch/*.zip.sha256
          if-no-files-found: error
          retention-days: 14
