name: Deploy marketing site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Verify project
        run: npm run check
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Build static marketing site
        run: npm run build:pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLIC_BETA_URL: ${{ vars.PUBLIC_BETA_URL }}
          PUBLIC_INTEREST_API_URL: ${{ vars.PUBLIC_INTEREST_API_URL }}
      - name: Verify Pages artifact
        run: npm run check:pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
