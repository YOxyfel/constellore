name: Deploy marketing site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --ignore-scripts
      - name: Verify project
        run: npm run check
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build static marketing site
        run: npm run build:pages
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          PUBLIC_BETA_URL: ${{ vars.PUBLIC_BETA_URL }}
          PUBLIC_ITCH_URL: ${{ vars.PUBLIC_ITCH_URL }}
      - name: Verify Pages artifact
        run: npm run check:pages
      - name: Install browser smoke-test runtime
        run: npx playwright install --with-deps chromium
      - name: Smoke-test the exact Pages artifact
        run: npm run test:e2e:pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
